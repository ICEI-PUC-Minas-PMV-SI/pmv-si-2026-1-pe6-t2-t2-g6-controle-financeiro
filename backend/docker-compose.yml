# PostgreSQL dedicado ao PoupaBem (não reutiliza containers de outros projetos).
# Uso: na pasta backend/ → docker compose up -d
#
# Se a porta 5432 já estiver em uso, altere para "5433:5432" e use Port=5433 na connection string.

services:
  postgres:
    image: postgres:16-alpine
    container_name: poupabem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: PoupaBem
    ports:
      - "5432:5432"
    volumes:
      - poupabem_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PoupaBem"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  poupabem_pgdata:
